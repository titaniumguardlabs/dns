[package]
name = "titaniumguard-dns"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[[bin]]
name = "titaniumguard-dns"
path = "main.rs"

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
opt-level = 3

[dependencies]
async-trait = { version = "0.1.89", default-features = false }
aws-lc-rs = { version = "1.17.0", features = ["unstable"] }
base64 = "0.22.1"
bytes = "1.11.1"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std"] }
h2 = { version = "0.4.14", default-features = false, features = ["stream"] }
hex = "0.4.3"
hickory-recursor = { version = "0.25.2", default-features = false, features = ["dnssec-aws-lc-rs"] }
hickory-server = { version = "0.25.2", default-features = false, features = ["tls-aws-lc-rs", "https-aws-lc-rs", "quic-aws-lc-rs", "h3-aws-lc-rs"] }
http = { version = "1.4.1", default-features = false }
libc = "0.2.186"
moka = { version = "0.12.15", default-features = false, features = ["future"] }
redis = { version = "1.2.2", default-features = false, features = ["tokio-comp"] }
regex = { version = "1.12.3", default-features = false, features = ["std"] }
rustls = { version = "0.23.40", default-features = false, features = ["std", "tls12", "logging", "aws-lc-rs", "prefer-post-quantum"] }
serde = { version = "1.0.228", default-features = false, features = ["derive"] }
serde_json = { version = "1.0.150", default-features = false, features = ["std"] }
tokio = { version = "1.52.3", default-features = false, features = ["macros", "rt-multi-thread", "net", "io-util", "sync", "signal", "time", "fs"] }
tokio-rustls = { version = "0.26.4", default-features = false, features = ["logging", "aws-lc-rs", "tls12"] }
tracing = { version = "0.1.44", default-features = false, features = ["std"] }
tracing-subscriber = { version = "0.3.23", default-features = false, features = ["fmt", "env-filter"] }
