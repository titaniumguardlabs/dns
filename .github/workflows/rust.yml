name: Rust

on:
  push:
    branches: ["main"]
    tags: ["*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Run tests
        run: cargo test

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: rust
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4

  cargo-build:
    name: Cargo Build (${{ matrix.arch }})
    runs-on: ubuntu-latest
    needs:
      - test
      - codeql
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-unknown-linux-gnu
          - arch: arm64
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v7
      - name: Build debug
        if: github.event_name == 'pull_request'
        run: cross build --target "${{ matrix.target }}"
      - name: Build release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: cross build --target "${{ matrix.target }}" --release

  cargo-publish:
    name: Cargo Publish
    runs-on: ubuntu-latest
    needs:
      - cargo-build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v7
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo login "$CARGO_REGISTRY_TOKEN"
          cargo publish --locked

  docker-build:
    name: Docker Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs:
      - test
      - codeql
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v7
      - name: Set image metadata
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            build_profile="debug"
            image_ref="titaniumguard-dns:${{ matrix.arch }}-${GITHUB_SHA}"
          else
            build_profile="release"
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              image_tag="${GITHUB_REF_NAME}"
            else
              image_tag="latest"
            fi
            image_ref="${REGISTRY}/${IMAGE_NAME}:${image_tag}-${{ matrix.arch }}"
          fi

          echo "BUILD_PROFILE=${build_profile}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${image_ref}" >> "$GITHUB_ENV"
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image
        run: docker build --build-arg BUILD_PROFILE="${BUILD_PROFILE}" --tag "${IMAGE_REF}" .
      - name: Push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: docker push "${IMAGE_REF}"

  docker-manifest:
    name: Docker Manifest
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Set image metadata
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            image_tag="${GITHUB_REF_NAME}"
          else
            image_tag="latest"
          fi

          image="${REGISTRY}/${IMAGE_NAME}:${image_tag}"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "IMAGE_AMD64=${image}-amd64" >> "$GITHUB_ENV"
          echo "IMAGE_ARM64=${image}-arm64" >> "$GITHUB_ENV"
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push multi-platform Docker manifest
        run: |
          docker manifest create "${IMAGE}" "${IMAGE_AMD64}" "${IMAGE_ARM64}"
          docker manifest annotate "${IMAGE}" "${IMAGE_AMD64}" --os linux --arch amd64
          docker manifest annotate "${IMAGE}" "${IMAGE_ARM64}" --os linux --arch arm64
          docker manifest push "${IMAGE}"
