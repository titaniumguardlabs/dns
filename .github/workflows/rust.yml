name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build debug
      if: github.event_name == 'pull_request'
      run: cargo build
    - name: Build release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: cargo build --release
    - name: Run tests
      run: cargo test
